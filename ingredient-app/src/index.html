<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredient App</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>
    <div class="pigeon">
        <img src="pigeon.jpg" alt="Pigeon">
    </div>
    <div class="container">
        <h1>Ingredient Search</h1>
        <form id="ingredient-form">
            <input type="text" id="ingredient-input" placeholder="Enter an ingredient" required spellcheck="true">
            <button id="search" type="submit">Search</button>
        </form>
        <p class="ingredient-list" id="ingredients"></p>

        <section class="table" id="table">   
            <section class="title">
                <p class="title_image">Image</p>
                <p class="title_ingredient">Ingredient</p>
                <p class="title_price">Price</p>
                <p class="title_shop">Shop</p>
                <p class="title_link">Link</p>
            </section>
        </section>
    </div>
</body>
</html>
