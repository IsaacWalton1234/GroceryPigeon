<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredient App</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>
    <div class="container">
        <h1>Ingredient Search</h1>
        <form id="ingredient-form">
            <input type="text" id="ingredient-input" placeholder="Enter an ingredient" required>
            <button id="search">Search</button>
        </form>
        <p class="ingredient-list" id="ingredients"></p>

        <section class="table">   
        <section class="title">
        <p class="title_ingredient">ingredient</p>
        <p class="title_price">price</p>
        <p class="title_shop">shop</p>
        </section>
      
        <section class="ingredient_row">
        <p id="ingredient_row"></p>
        <p class="price" id="price"></p>
        <p class="shop" id="shop"></p>
        </section>
    </div>
</section>
</body>
</html>
